version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: shnq_postgres
    restart: always
    environment:
      POSTGRES_USER: shnq_user
      POSTGRES_PASSWORD: shnq_pass
      POSTGRES_DB: shnq_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: shnq_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8090:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg2://shnq_user:shnq_pass@postgres:5432/shnq_db

  frontend:
    build: ./frontend
    container_name: shnq_frontend
    restart: always
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    ports:
      - "3100:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8090

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
