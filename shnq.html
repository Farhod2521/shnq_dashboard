<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern AI Chat Interface</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Lucide Icons for high-quality, modern icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="custom-styling">
    .chat-container {
      max-width: 900px;
      margin: 0 auto;
    }
    .action-button {
      transition: all 0.2s ease-in-out;
    }
    .action-button:hover {
      background-color: #f3f4f6;
      border-color: #d1d5db;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-10">
<!-- BEGIN: Chat Wrapper -->
<main class="chat-container flex flex-col space-y-8" data-purpose="chat-interface">

<!-- END: User Message Section -->
<!-- BEGIN: Bot Message Section -->
<section class="flex items-start gap-4" data-purpose="bot-message-row">
<!-- Bot Avatar Container -->
<div class="flex-shrink-0 mt-1" data-purpose="bot-avatar">
<div class="w-8 h-8 rounded-lg bg-blue-50 border border-blue-100 flex items-center justify-center text-blue-600">
<i class="w-5 h-5" data-lucide="bot"></i>
</div>
</div>
<!-- Bot Bubble and Actions -->
<div class="flex flex-col gap-2 max-w-2xl w-full">
<div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm" data-purpose="bot-bubble">

<!-- Separator Line -->
<div class="my-4 border-t border-gray-100"></div>
<!-- BEGIN: Action Toolbar -->
<div class="flex flex-wrap items-center gap-2" data-purpose="message-actions">
<!-- Copy Action -->
<button class="action-button p-2 border border-gray-100 rounded-lg text-gray-500 hover:text-blue-600" title="Copy text">
<i class="w-4 h-4" data-lucide="copy"></i>
</button>
<!-- Export Word Action -->
<button class="action-button p-2 border border-gray-100 rounded-lg text-gray-500 hover:text-blue-700" title="Export to Word">
<i class="w-4 h-4 text-blue-500" data-lucide="file-text"></i>
</button>
<!-- Export PDF Action -->
<button class="action-button p-2 border border-gray-100 rounded-lg text-gray-500 hover:text-red-600" title="Export to PDF">
<i class="w-4 h-4 text-red-500" data-lucide="file-type-2"></i>
</button>
<!-- Divider between Export and Feedback -->
<div class="h-6 w-px bg-gray-200 mx-1"></div>
<!-- Like Action -->
<button class="action-button p-2 border border-gray-100 rounded-lg text-gray-500 hover:text-green-600" title="Like">
<i class="w-4 h-4" data-lucide="thumbs-up"></i>
</button>
<!-- Dislike Action -->
<button class="action-button p-2 border border-gray-100 rounded-lg text-gray-500 hover:text-red-600" title="Dislike">
<i class="w-4 h-4" data-lucide="thumbs-down"></i>
</button>
</div>
<!-- END: Action Toolbar -->
</div>
</div>
</section>
<!-- END: Bot Message Section -->
</main>
<!-- END: Chat Wrapper -->
<!-- BEGIN: JavaScript for Icons -->
<script data-purpose="icon-initialization">
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
<!-- END: JavaScript for Icons -->
</body></html>
